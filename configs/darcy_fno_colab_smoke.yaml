arch:
  decoder:
    out_features: 1
    layers: 1
    layer_size: 32
  fno:
    in_channels: 1
    dimension: 2
    latent_channels: 16
    fno_layers: 4
    fno_modes: 8
    padding: 9
normaliser:
  permeability:
    mean: 1.25
    std_dev: .75
  darcy:
    mean: 4.52E-2
    std_dev: 2.79E-2
scheduler:
  initial_lr: 1.E-3
  decay_rate: .85
  decay_pseudo_epochs: 4
training:
  resolution: 64
  batch_size: 4
  rec_results_freq : 2
  max_pseudo_epochs: 4
  pseudo_epoch_sample_size: 16
validation:
  sample_size: 8
  validation_pseudo_epochs: 2
